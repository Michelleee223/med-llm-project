<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b2dfdb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#4db6ac" stroke-width="2"/>
  <!-- Medical cross -->
  <rect x="26" y="16" width="12" height="32" rx="3" fill="#00897b"/>
  <rect x="16" y="26" width="32" height="12" rx="3" fill="#00897b"/>
